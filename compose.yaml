services:
  playlist-maker:
    image: ghcr.io/johnfawkes/anime-watch-order-maker:latest
    container_name: playlist-maker
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./data:/data
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=${TZ:-UTC}
    restart: unless-stopped
