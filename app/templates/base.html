<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Anime Watch Order Maker{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <style>
    .htmx-indicator { opacity: 0; transition: opacity 200ms ease; }
    .htmx-request .htmx-indicator { opacity: 1; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

{% block nav %}
<header class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-10">
  <div class="max-w-7xl mx-auto px-6 h-14 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2.5 group">
      <div class="w-7 h-7 rounded-lg bg-violet-600 flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <span class="text-sm font-semibold tracking-tight group-hover:text-violet-400 transition-colors">Anime Watch Order Maker</span>
    </a>
    <nav class="flex items-center gap-1">
      <a href="/settings" class="px-3 py-1.5 rounded-md text-sm text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 transition-colors">Settings</a>
      <a href="/logout" class="px-3 py-1.5 rounded-md text-sm text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 transition-colors">Logout</a>
    </nav>
  </div>
</header>
{% endblock %}

<main class="max-w-7xl mx-auto px-6 py-8">
  {% block content %}{% endblock %}
</main>

</body>
</html>
