{% if error %}
<div class="px-3 py-2 bg-rose-950/40 border border-rose-800/60 rounded-lg text-rose-400 text-xs">
  {{ error }}
</div>
{% elif not libraries %}
<div class="px-3 py-2 bg-amber-950/30 border border-amber-800/50 rounded-lg text-amber-500 text-xs">
  No movie libraries found on this Plex server.
</div>
{% else %}
<select name="movie_library"
  class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3.5 py-2.5 text-sm text-zinc-100 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition">
  <option value="">— None —</option>
  {% for lib in libraries %}
  <option value="{{ lib.title }}">{{ lib.title }}</option>
  {% endfor %}
</select>
{% endif %}
