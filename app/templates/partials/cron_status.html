<div id="cron-status" class="mt-3">
  {% if error %}
  <div class="flex items-center gap-2 px-3 py-2.5 bg-rose-950/40 border border-rose-800/60 rounded-lg text-rose-400 text-sm">
    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
    </svg>
    <span>{{ error }}</span>
  </div>
  {% elif result %}
  <div class="flex items-center gap-2 px-3 py-2.5 bg-emerald-950/40 border border-emerald-800/60 rounded-lg text-emerald-400 text-sm">
    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
    </svg>
    <span>
      Done &mdash;
      <strong>{{ result.created }}</strong> updated,
      <strong>{{ result.up_to_date or 0 }}</strong> already up-to-date,
      <strong>{{ result.skipped }}</strong> skipped,
      {% if result.errors %}<strong class="text-rose-400">{{ result.errors }}</strong> error{{ 's' if result.errors != 1 else '' }}{% else %}<strong>0</strong> errors{% endif %}
    </span>
  </div>
  {% endif %}
</div>
