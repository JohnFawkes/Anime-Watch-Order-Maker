{% extends "base.html" %}
{% block title %}Sign In — Anime Watch Order Maker{% endblock %}

{% block nav %}{# no nav on login page #}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center -mt-8">
  <div class="w-full max-w-sm">

    <div class="flex items-center justify-center gap-3 mb-8">
      <div class="w-10 h-10 rounded-xl bg-violet-600 flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <div>
        <h1 class="text-lg font-bold leading-tight">Anime Watch Order Maker</h1>
        <p class="text-xs text-zinc-500">Sign in to continue</p>
      </div>
    </div>

    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6">
      {% if error %}
      <div class="mb-5 px-3.5 py-2.5 bg-rose-950/60 border border-rose-800/70 rounded-lg text-rose-400 text-sm">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-zinc-400 mb-1.5" for="username">Username</label>
          <input
            id="username" name="username" type="text" autocomplete="username" required autofocus
            class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3.5 py-2.5 text-sm text-zinc-100 placeholder-zinc-600 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition"
          >
        </div>
        <div>
          <label class="block text-xs font-medium text-zinc-400 mb-1.5" for="password">Password</label>
          <input
            id="password" name="password" type="password" autocomplete="current-password" required
            class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3.5 py-2.5 text-sm text-zinc-100 placeholder-zinc-600 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition"
          >
        </div>
        <button
          type="submit"
          class="w-full bg-violet-600 hover:bg-violet-500 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors mt-2"
        >
          Sign in
        </button>
      </form>
    </div>

  </div>
</div>
{% endblock %}
