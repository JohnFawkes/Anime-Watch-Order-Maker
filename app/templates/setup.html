<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup — Anime Watch Order Maker</title>
  <script src="https://cdn.tailwindcss.com/3.4.17" integrity="sha384-igm5BeiBt36UU4gqwWS7imYmelpTsZlQ45FZf+XBn9MuJbn4nQr7yx1yFydocC/K" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-start justify-center py-12 px-4">

<div class="w-full max-w-lg">

  <div class="flex items-center gap-3 mb-8">
    <div class="w-10 h-10 rounded-xl bg-violet-600 flex items-center justify-center flex-shrink-0">
      <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    </div>
    <div>
      <h1 class="text-xl font-bold">Anime Watch Order Maker</h1>
      <p class="text-sm text-zinc-500">First-time setup</p>
    </div>
  </div>

  {% if error %}
  <div class="mb-6 px-4 py-3 bg-rose-950/60 border border-rose-800/70 rounded-xl text-rose-400 text-sm">
    {{ error }}
  </div>
  {% endif %}

  <form method="post" action="/setup" class="space-y-6">

    <!-- Account -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6">
      <h2 class="text-sm font-semibold text-zinc-300 mb-4">Account</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-zinc-400 mb-1.5">Username</label>
          <input name="username" type="text" autocomplete="off" required
            class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3.5 py-2.5 text-sm text-zinc-100 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition">
        </div>
        <div>
          <label class="block text-xs font-medium text-zinc-400 mb-1.5">Password</label>
          <input name="password" type="password" autocomplete="new-password" required
            class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3.5 py-2.5 text-sm text-zinc-100 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition">
        </div>
      </div>
    </div>

    <!-- Plex -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6">
      <h2 class="text-sm font-semibold text-zinc-300 mb-4">Plex Server</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-zinc-400 mb-1.5">Server URL</label>
          <input name="plex_url" type="url" placeholder="http://192.168.1.x:32400" required
            class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3.5 py-2.5 text-sm text-zinc-100 placeholder-zinc-600 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition">
        </div>
        <div>
          <label class="block text-xs font-medium text-zinc-400 mb-1.5">
            Plex Token
            <span class="text-zinc-600 font-normal ml-1">— found in Plex account settings &rarr; Troubleshooting</span>
          </label>
          <input name="plex_token" type="password" required
            class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3.5 py-2.5 text-sm text-zinc-100 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition">
        </div>
        <div>
          <button
            type="button"
            class="text-sm px-4 py-2 rounded-lg bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-zinc-300 transition-colors"
            hx-post="/api/plex-libraries"
            hx-target="#library-container"
            hx-include="[name='plex_url'],[name='plex_token']"
            hx-indicator="#lib-spinner"
          >
            Discover Libraries
          </button>
          <span id="lib-spinner" class="htmx-indicator ml-2 text-xs text-zinc-500">Connecting...</span>
        </div>
        <div id="library-container">
          <div>
            <label class="block text-xs font-medium text-zinc-400 mb-1.5">Anime Library Name</label>
            <input name="plex_library" type="text" placeholder="e.g. Anime" required
              class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3.5 py-2.5 text-sm text-zinc-100 placeholder-zinc-600 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition">
          </div>
        </div>
      </div>
    </div>

    <!-- TVDB -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6">
      <h2 class="text-sm font-semibold text-zinc-300 mb-4">TVDB</h2>
      <div>
        <label class="block text-xs font-medium text-zinc-400 mb-1.5">
          API Key
          <span class="text-zinc-600 font-normal ml-1">— from thetvdb.com/dashboard/api-keys</span>
        </label>
        <input name="tvdb_api_key" type="password" required
          class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3.5 py-2.5 text-sm text-zinc-100 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition">
      </div>
    </div>

    <button
      type="submit"
      class="w-full bg-violet-600 hover:bg-violet-500 text-white font-semibold py-3 rounded-xl text-sm transition-colors"
    >
      Complete Setup
    </button>

  </form>
</div>

</body>
</html>
