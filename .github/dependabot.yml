version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      fastapi:
        patterns:
          - "fastapi"
          - "uvicorn"
          - "python-multipart"
          - "itsdangerous"
      plex:
        patterns:
          - "plexapi"
      security:
        patterns:
          - "cryptography"
          - "passlib"
          - "bcrypt"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
